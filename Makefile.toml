# Nightly toolchain (pinned) is used ONLY for strict developer checks.
# End users and release builds use stable Rust.

[config]
default_to_workspace = false

[env]
NIGHTLY = "nightly-2026-05-02"

[tasks.fmt]
command = "cargo"
args = ["fmt", "--all", "--", "--check"]

[tasks.clippy]
toolchain = "${NIGHTLY}"
command = "cargo"
args = ["clippy", "--all-targets", "--all-features", "--", "-D", "warnings"]

[tasks.test]
toolchain = "${NIGHTLY}"
command = "cargo"
args = ["nextest", "run", "--all-features"]

[tasks.deny]
command = "cargo"
args = ["deny", "check"]

[tasks.audit]
# `cargo deny check` already covers advisories; we run audit as a second source of truth.
# We drop the explicit --ignore list here to keep deny.toml as the single source of truth for ignores.
command = "cargo"
args = [
    "audit",
    "--ignore", "RUSTSEC-2025-0140",
    "--ignore", "RUSTSEC-2025-0021",
    "--ignore", "RUSTSEC-2021-0145",
    "--ignore", "RUSTSEC-2024-0375",
    "--ignore", "RUSTSEC-2024-0436",
    "--ignore", "RUSTSEC-2025-0119",
]

[tasks.miri]
toolchain = "${NIGHTLY}"
command = "cargo"
args = ["miri", "test"]

[tasks.semver]
ignore_errors = true
command = "cargo"
args = ["semver-checks", "check-release", "--baseline-root", "."]

[tasks.udeps]
toolchain = "${NIGHTLY}"
command = "cargo"
args = ["udeps", "--all-targets"]

[tasks.mutants]
toolchain = "${NIGHTLY}"
ignore_errors = true
command = "cargo"
args = ["mutants"]

[tasks.hack]
toolchain = "${NIGHTLY}"
command = "cargo"
args = ["hack", "test", "--feature-powerset"]

[tasks.llvm-lines]
toolchain = "${NIGHTLY}"
command = "cargo"
args = ["llvm-lines", "--package", "gleon", "--release"]

[tasks.expand]
toolchain = "${NIGHTLY}"
command = "cargo"
args = ["expand"]

[tasks.trust]
script = '''
if cargo trust --version > /dev/null 2>&1; then
    cargo trust
else
    echo "cargo-trust not available on this platform, skipping"
fi
'''

[tasks.llvm-cov]
toolchain = "${NIGHTLY}"
command = "cargo"
args = ["llvm-cov", "--all-features", "--lcov", "--output-path", "lcov.info", "--fail-under-lines", "20"]

[tasks.call-stack]
toolchain = "${NIGHTLY}"
command = "cargo"
args = ["call-stack"]

[tasks.bloat]
toolchain = "${NIGHTLY}"
ignore_errors = true
command = "cargo"
args = ["bloat", "--release", "--crates"]

[tasks.check-all]
dependencies = [
    "fmt",
    "clippy",
    "test",
    "deny",
    "audit",
    "semver",
    "udeps",
    "llvm-lines",
    "trust",
    "miri",
    "bloat",
    "llvm-cov"
]
